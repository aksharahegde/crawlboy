name: Security

on:
  pull_request:
  push:
  schedule:
    - cron: '0 3 * * *'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Security tests
        run: pytest tests/security
      - name: Bandit
        run: bandit -q -r crawlboy
      - name: Dependency audit
        run: pip-audit
